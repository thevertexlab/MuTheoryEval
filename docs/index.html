<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuTheoryEval Leaderboard</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --pill-bg:  #252839;
      --pill-act: #6366f1;
      --heat-low:  #1e3a2f;
      --heat-mid:  #166534;
      --heat-high: #15803d;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .header-icon {
      color: var(--accent2);
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-text p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }
    .header-links {
      margin-left: auto;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-shrink: 0;
    }
    .header-links a {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.4rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .header-links a:hover { color: var(--text); border-color: var(--accent2); }

    /* ── Controls ── */
    .controls {
      padding: 1.25rem 2rem 0.75rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill-group {
      display: flex;
      gap: 0.35rem;
      background: var(--pill-bg);
      padding: 0.25rem;
      border-radius: 0.5rem;
    }
    .pill {
      cursor: pointer;
      padding: 0.3rem 0.75rem;
      border-radius: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .pill.active { background: var(--pill-act); color: #fff; }

    .modality-filter {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      margin-left: 0.5rem;
    }
    .mod-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      padding: 0.3rem 0.65rem;
      border-radius: 0.35rem;
      font-size: 0.78rem;
      color: var(--muted);
      border: 1px solid var(--border);
      user-select: none;
      transition: all 0.15s;
    }
    .mod-tag.active { color: var(--text); border-color: var(--accent2); background: rgba(99,102,241,0.12); }

    .updated-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Stats bar ── */
    .stats-bar {
      padding: 0.5rem 2rem 1rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .stats-bar strong { color: var(--text); }

    /* ── Table container ── */
    .table-wrap {
      padding: 0 2rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--accent2); }
    thead th .th-inner {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    thead th .sort-icon { color: var(--muted); flex-shrink: 0; }
    thead th.sorted .sort-icon { color: var(--accent2); }

    .bench-header {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .bench-header .bench-name { font-size: 0.82rem; }
    .bench-header .bench-meta {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    td {
      padding: 0.55rem 0.85rem;
      vertical-align: middle;
    }

    .model-cell {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .model-name { font-weight: 600; font-size: 0.85rem; font-family: ui-monospace, monospace; }
    .model-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .model-provider { font-size: 0.72rem; color: var(--muted); }
    .badge-reasoning {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.3);
      letter-spacing: 0.02em;
    }
    .badge-thinking {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      background: rgba(99,102,241,0.15);
      color: var(--accent2);
      border: 1px solid rgba(99,102,241,0.3);
      letter-spacing: 0.02em;
    }

    .score-cell {
      text-align: center;
      border-radius: 0.3rem;
      position: relative;
    }
    .score-val { font-weight: 600; font-size: 0.88rem; }
    .score-n { font-size: 0.68rem; color: var(--muted); }
    .score-miss { color: var(--muted); text-align: center; font-size: 1.1rem; }

    /* heat map coloring via inline style set by JS */

    /* ── Tooltip ── */
    .tooltip-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
    .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2130;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: opacity 0.12s;
      color: var(--text);
    }
    .tooltip-wrap:hover .tooltip { visibility: visible; opacity: 1; }
    .tooltip table td { padding: 0.1rem 0.35rem 0.1rem 0; color: var(--muted); }
    .tooltip table td:last-child { color: var(--text); font-weight: 500; }

    /* ── Loading / error ── */
    #state {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }
    footer a:hover { color: var(--text); }
    .contribute-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      border-radius: 0.4rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .contribute-btn:hover { background: var(--accent2); color: #fff; }
  </style>
</head>
<body>

<header>
  <span class="header-icon"><i data-lucide="music-2" width="28" height="28"></i></span>
  <div class="header-text">
    <h1>MuTheoryEval Leaderboard</h1>
    <p>Open benchmarking suite for LLM music theory &amp; music understanding</p>
  </div>
  <div class="header-links">
    <a href="https://github.com/thevertexlab/MuTheoryEval" target="_blank">
      <i data-lucide="github" width="14" height="14"></i> GitHub
    </a>
    <a href="https://github.com/thevertexlab/MuTheoryEval#contributing" target="_blank">
      <i data-lucide="git-pull-request" width="14" height="14"></i> Contribute
    </a>
  </div>
</header>

<div class="controls">
  <div>
    <span style="font-size:0.78rem;color:var(--muted);margin-right:0.4rem;">Mode</span>
    <div class="pill-group" id="mode-group">
      <div class="pill active" data-mode="lite">Lite (reproducible)</div>
      <div class="pill" data-mode="full">Full</div>
    </div>
  </div>

  <div class="modality-filter" id="modality-filter">
    <span style="font-size:0.78rem;color:var(--muted);">Show</span>
    <div class="mod-tag active" data-mod="text">
      <i data-lucide="file-text" width="12" height="12"></i> Text
    </div>
    <div class="mod-tag active" data-mod="image">
      <i data-lucide="image" width="12" height="12"></i> Image
    </div>
    <div class="mod-tag active" data-mod="audio">
      <i data-lucide="music" width="12" height="12"></i> Audio
    </div>
  </div>

  <div class="updated-badge" id="updated-badge">
    <i data-lucide="clock" width="13" height="13"></i>
    <span id="updated-text">loading…</span>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="state">
  <i data-lucide="loader-2" width="18" height="18" style="animation:spin 1s linear infinite"></i>
  Loading data…
</div>
<div class="table-wrap" id="table-wrap" style="display:none"></div>

<footer>
  <span>Data sourced from <code>docs/data.json</code> — updated automatically by contributors via PR.</span>
  <a href="https://github.com/thevertexlab/MuTheoryEval/blob/main/CLAUDE.md" target="_blank">How to run</a>
  <a class="contribute-btn" href="https://github.com/thevertexlab/MuTheoryEval#contributing" target="_blank">
    <i data-lucide="plus-circle" width="14" height="14"></i> Submit your results
  </a>
</footer>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
  // ── Constants ─────────────────────────────────────────────────────────────
  // Models whose thinking/reasoning cannot be disabled — shown with a badge
  const REASONING_NATIVE = ['o1', 'o3', 'o4', 'deepseek-reasoner', 'deepseek-r1'];
  function isReasoningNative(modelKey) {
    return REASONING_NATIVE.some(p => modelKey === p || modelKey.startsWith(p + '-'));
  }
  function hasThinkingVariant(modelKey) {
    // e.g. claude-sonnet-4-6-xt8k, gemini-2.5-pro-thinking
    return modelKey.includes('-xt') || modelKey.includes('-thinking') || modelKey.includes('-effort');
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let DATA = null;
  let currentMode = 'lite';
  let activeModalities = new Set(['text', 'image', 'audio']);
  let sortKey = null;   // null = default (weighted score), or bench key
  let sortDir = 1;      // 1=desc, -1=asc

  // ── Fetch ─────────────────────────────────────────────────────────────────
  fetch('./data.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      DATA = data;
      initUI();
    })
    .catch(err => {
      document.getElementById('state').innerHTML =
        `<i data-lucide="alert-circle" width="18" height="18" style="color:var(--red)"></i>
         Failed to load data.json: ${err.message}`;
      lucide.createIcons();
    });

  // ── Init ──────────────────────────────────────────────────────────────────
  function initUI() {
    // Updated badge
    if (DATA.updated) {
      const d = new Date(DATA.updated);
      document.getElementById('updated-text').textContent =
        'Updated ' + d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    }

    // Mode toggle
    document.getElementById('mode-group').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#mode-group .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentMode = pill.dataset.mode;
      render();
    });

    // Modality filter
    document.getElementById('modality-filter').addEventListener('click', e => {
      const tag = e.target.closest('.mod-tag');
      if (!tag) return;
      const mod = tag.dataset.mod;
      if (activeModalities.has(mod)) {
        if (activeModalities.size === 1) return; // keep at least one
        activeModalities.delete(mod);
        tag.classList.remove('active');
      } else {
        activeModalities.add(mod);
        tag.classList.add('active');
      }
      render();
    });

    render();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function cellsForMode(mode) {
    return DATA.cells.filter(c => c.mode === mode);
  }

  function cellMap(cells) {
    const m = {};
    for (const c of cells) m[c.model + '||' + c.benchmark] = c;
    return m;
  }

  function visibleBenches(benches) {
    return benches.filter(b => activeModalities.has(b.modality));
  }

  function weightedScore(modelKey, benchMap, benches) {
    const vis = visibleBenches(benches);
    let totalW = 0, sumW = 0;
    for (const b of vis) {
      const c = benchMap[modelKey + '||' + b.key];
      if (c) { sumW += c.accuracy * b.weight; totalW += b.weight; }
    }
    return totalW > 0 ? sumW / totalW : null;
  }

  function heatColor(score) {
    if (score === null) return '';
    // 0–50%: dark red-ish  50–70%: amber-ish  70–100%: green
    const pct = Math.min(1, Math.max(0, score));
    if (pct < 0.5) {
      const t = pct / 0.5;
      return `rgba(239,68,68,${0.08 + t * 0.12})`;
    } else if (pct < 0.7) {
      const t = (pct - 0.5) / 0.2;
      return `rgba(245,158,11,${0.1 + t * 0.1})`;
    } else {
      const t = (pct - 0.7) / 0.3;
      return `rgba(34,197,94,${0.1 + t * 0.2})`;
    }
  }

  function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const cells = cellsForMode(currentMode);
    const cmap  = cellMap(cells);
    const benches = visibleBenches(DATA.benchmarks);

    // Gather models that have at least one cell in this mode
    const modelKeys = Array.from(new Set(
      DATA.cells.filter(c => c.mode === currentMode).map(c => c.model)
    ));

    // Sort
    const modelsSorted = modelKeys.slice().sort((a, b) => {
      if (sortKey === null) {
        // default: weighted score desc
        const sa = weightedScore(a, cmap, DATA.benchmarks) ?? -1;
        const sb = weightedScore(b, cmap, DATA.benchmarks) ?? -1;
        return sb - sa;
      } else {
        const ca = cmap[a + '||' + sortKey];
        const cb = cmap[b + '||' + sortKey];
        const va = ca ? ca.accuracy : -1;
        const vb = cb ? cb.accuracy : -1;
        return (vb - va) * sortDir;
      }
    });

    // Stats
    const statsEl = document.getElementById('stats-bar');
    const nCells = cells.filter(c => benches.some(b => b.key === c.benchmark)).length;
    statsEl.innerHTML =
      `<span><strong>${modelsSorted.length}</strong> models</span>` +
      `<span><strong>${benches.length}</strong> benchmarks visible</span>` +
      `<span><strong>${nCells}</strong> result cells</span>`;

    // Build table
    const wrap = document.getElementById('table-wrap');

    // Header
    const thModel = `<th class="sortable${sortKey===null?' sorted':''}" onclick="setSort(null)">
      <div class="th-inner">Model
        <i data-lucide="${sortKey===null?'chevrons-up-down':'chevrons-up-down'}" width="13" height="13" class="sort-icon"></i>
      </div></th>`;

    const thWS = `<th class="sortable${sortKey==='__ws'?' sorted':''}" onclick="setSort('__ws')" title="Weighted score across visible benchmarks">
      <div class="th-inner">Weighted Score
        <i data-lucide="chevrons-up-down" width="13" height="13" class="sort-icon"></i>
      </div></th>`;

    const thBenches = benches.map(b => {
      const modIcon = b.modality === 'text' ? 'file-text' : b.modality === 'image' ? 'image' : 'music';
      const isSorted = sortKey === b.key;
      const srcLink = b.source ? `<a href="https://arxiv.org/abs/${b.source.replace('arXiv:','')}" target="_blank" style="color:var(--muted)" onclick="event.stopPropagation()">
        <i data-lucide="external-link" width="11" height="11"></i></a>` : '';
      return `<th class="sortable${isSorted?' sorted':''}" onclick="setSort('${b.key}')">
        <div class="th-inner">
          <div class="bench-header">
            <span class="bench-name">${b.short}</span>
            <span class="bench-meta">
              <i data-lucide="${modIcon}" width="11" height="11"></i>
              <span>${b.modality}</span>
              ${srcLink}
              <i data-lucide="chevrons-up-down" width="11" height="11" class="sort-icon"></i>
            </span>
          </div>
        </div></th>`;
    }).join('');

    let tbody = '';
    for (const mk of modelsSorted) {
      const provider = (DATA.models.find(m => m.key === mk) || {}).provider || '';
      const ws = weightedScore(mk, cmap, DATA.benchmarks);
      const wsBg = heatColor(ws);

      const reasoningBadge = isReasoningNative(mk)
        ? `<span class="badge-reasoning"><i data-lucide="cpu" width="9" height="9"></i> reasoning</span>`
        : '';
      const thinkingBadge = hasThinkingVariant(mk)
        ? `<span class="badge-thinking"><i data-lucide="sparkles" width="9" height="9"></i> thinking</span>`
        : '';

      const tdModel = `<td>
        <div class="model-cell">
          <span class="model-name">${mk}</span>
          <div class="model-meta">
            <span class="model-provider">${provider}</span>
            ${reasoningBadge}${thinkingBadge}
          </div>
        </div></td>`;

      const tdWS = ws !== null
        ? `<td class="score-cell" style="background:${wsBg}">
            <div class="score-val">${fmtPct(ws)}</div>
            <div class="score-n">weighted</div>
           </td>`
        : `<td class="score-miss">—</td>`;

      const tdBenches = benches.map(b => {
        const c = cmap[mk + '||' + b.key];
        if (!c) return `<td class="score-miss">—</td>`;
        const bg = heatColor(c.accuracy);
        const tooltipRows = [
          ['Accuracy', fmtPct(c.accuracy)],
          ['Questions', c.n],
          c.seed != null ? ['Seed', c.seed] : null,
          c.cost_est_usd != null ? ['Est. cost', '$' + c.cost_est_usd.toFixed(4)] : null,
          c.elapsed_sec != null ? ['Elapsed', c.elapsed_sec + 's'] : null,
          c.timestamp ? ['Date', fmtDate(c.timestamp)] : null,
        ].filter(Boolean);
        const tooltipHTML = tooltipRows
          .map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
        return `<td class="score-cell" style="background:${bg}">
          <div class="tooltip-wrap">
            <div class="score-val">${fmtPct(c.accuracy)}</div>
            <div class="score-n">${c.n}q</div>
            <div class="tooltip"><table>${tooltipHTML}</table></div>
          </div></td>`;
      }).join('');

      tbody += `<tr>${tdModel}${tdWS}${tdBenches}</tr>`;
    }

    if (!modelsSorted.length) {
      tbody = `<tr><td colspan="${2 + benches.length}" style="text-align:center;padding:3rem;color:var(--muted)">
        No results for mode="${currentMode}" yet.</td></tr>`;
    }

    wrap.innerHTML = `<table>
      <thead><tr>${thModel}${thWS}${thBenches}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;

    document.getElementById('state').style.display = 'none';
    wrap.style.display = 'block';

    lucide.createIcons();
  }

  function setSort(key) {
    if (key === '__ws') key = null;
    if (sortKey === key) {
      sortDir = -sortDir;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    render();
  }
</script>
</body>
</html>
