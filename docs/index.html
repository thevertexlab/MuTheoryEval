<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuTheoryEval Leaderboard</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --pill-bg:  #252839;
      --pill-act: #6366f1;
      --heat-low:  #1e3a2f;
      --heat-mid:  #166534;
      --heat-high: #15803d;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 4rem;
      /* Blink/WebKit: position:sticky inside overflow-x:auto inflates the body's
         scrollWidth, creating a phantom horizontal scrollbar + blank space on the
         right. overflow-x:hidden on body clips that inflation. Child overflow-x:auto
         containers (.table-wrap) are unaffected — they create independent scroll
         contexts and show their own scrollbar normally. */
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .header-icon {
      color: var(--accent2);
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-text p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }
    .header-links {
      margin-left: auto;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-shrink: 0;
    }
    .header-links a {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.4rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .header-links a:hover { color: var(--text); border-color: var(--accent2); }

    /* ── Controls ── */
    .controls {
      padding: 1.25rem 2rem 0.75rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill-group {
      display: flex;
      gap: 0.35rem;
      background: var(--pill-bg);
      padding: 0.25rem;
      border-radius: 0.5rem;
    }
    .pill {
      cursor: pointer;
      padding: 0.3rem 0.75rem;
      border-radius: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .pill.active { background: var(--pill-act); color: #fff; }

    .modality-filter {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      margin-left: 0.5rem;
    }
    .mod-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      padding: 0.3rem 0.65rem;
      border-radius: 0.35rem;
      font-size: 0.78rem;
      color: var(--muted);
      border: 1px solid var(--border);
      user-select: none;
      transition: all 0.15s;
    }
    .mod-tag.active { color: var(--text); border-color: var(--accent2); background: rgba(99,102,241,0.12); }

    .updated-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Stats bar ── */
    .stats-bar {
      padding: 0.5rem 2rem 1rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .stats-bar strong { color: var(--text); }

    /* ── Table container ──
       .table-outer is a plain wrapper.
       .table-wrap is the actual horizontal scroll container; margin (not padding)
       keeps the visual gutter outside the scrollable area — padding inside a scroll
       container adds blank space at the scroll end. */
    .table-outer {
      /* plain wrapper — no overflow needed; body handles phantom scroll */
    }
    .table-wrap {
      margin: 0 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--accent2); }
    thead th .th-inner {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    thead th .sort-icon { color: var(--muted); flex-shrink: 0; }
    thead th.sorted .sort-icon { color: var(--accent2); }

    .bench-header {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .bench-header .bench-name { font-size: 0.82rem; }
    .bench-header .bench-meta {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    td {
      padding: 0.55rem 0.85rem;
      vertical-align: middle;
    }

    .model-cell {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .model-name { font-weight: 600; font-size: 0.85rem; font-family: ui-monospace, monospace; }
    .model-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .model-provider { font-size: 0.72rem; color: var(--muted); }
    .badge-thinking {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      background: rgba(99,102,241,0.15);
      color: var(--accent2);
      border: 1px solid rgba(99,102,241,0.3);
      letter-spacing: 0.02em;
    }

    .score-cell {
      text-align: center;
      border-radius: 0.3rem;
      position: relative;
    }
    .score-val { font-weight: 600; font-size: 0.88rem; }
    .score-n { font-size: 0.68rem; color: var(--muted); }
    .score-miss { color: var(--muted); text-align: center; font-size: 1.1rem; }

    /* heat map coloring via inline style set by JS */

    /* ── Capability chips on model cell ── */
    .cap-chips { display: flex; gap: 0.25rem; margin-top: 0.2rem; }
    .cap-chip {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 0.1rem 0.3rem; border-radius: 0.2rem;
    }
    .cap-chip.supported   { background: rgba(99,102,241,0.18); color: var(--accent2); }
    .cap-chip.unsupported { background: rgba(255,255,255,0.05); color: var(--muted); opacity: 0.45; }

    /* ── Cell states: unsupported vs not-run ── */
    .cell-unsupported {
      background: repeating-linear-gradient(
        -45deg,
        transparent, transparent 4px,
        rgba(255,255,255,0.025) 4px, rgba(255,255,255,0.025) 8px
      ) !important;
      cursor: default;
    }
    .cell-contribute {
      cursor: default;
    }
    .cell-contribute .contribute-hint {
      display: inline-flex; align-items: center; gap: 0.2rem;
      color: var(--muted); font-size: 0.75rem; opacity: 0.5;
      transition: opacity 0.15s;
    }
    .cell-contribute:hover .contribute-hint { opacity: 1; color: var(--accent2); }

    /* ── Modality score columns (aggregate summary) ── */
    .mod-score-th {
      background: rgba(99,102,241,0.07) !important;
      border-left: 2px solid rgba(99,102,241,0.35) !important;
    }
    .mod-score-td {
      background: rgba(99,102,241,0.06);
      border-left: 2px solid rgba(99,102,241,0.25);
    }
    .mod-score-miss {
      background: rgba(99,102,241,0.04);
      border-left: 2px solid rgba(99,102,241,0.25);
    }

    /* ── Tooltip ── */
    .tooltip-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
    .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2130;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: opacity 0.12s;
      color: var(--text);
    }
    .tooltip-wrap:hover .tooltip { visibility: visible; opacity: 1; }
    .tooltip table td { padding: 0.1rem 0.35rem 0.1rem 0; color: var(--muted); }
    .tooltip table td:last-child { color: var(--text); font-weight: 500; }

    /* Rich tooltip variant — wraps text, wider, used for bench/model headers */
    .tooltip-rich {
      white-space: normal;
      min-width: 260px;
      max-width: 360px;
      line-height: 1.5;
    }
    .tooltip-rich .tt-title {
      font-weight: 700; font-size: 0.8rem; color: var(--text);
      margin-bottom: 0.3rem;
    }
    .tooltip-rich .tt-desc {
      color: var(--muted); font-size: 0.72rem; margin-bottom: 0.4rem;
      line-height: 1.45;
    }
    .tooltip-rich hr { border: none; border-top: 1px solid var(--border); margin: 0.35rem 0; }
    .tooltip-rich table { width: 100%; }
    .tooltip-rich table td { padding: 0.1rem 0.4rem 0.1rem 0; font-size: 0.72rem; }
    .tooltip-rich table td:first-child { color: var(--muted); white-space: nowrap; }
    .tooltip-rich table td:last-child { color: var(--text); font-weight: 500; }
    .tooltip-rich .tt-badge {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      padding: 0.1rem 0.3rem; border-radius: 0.2rem; margin-right: 0.25rem;
      background: rgba(99,102,241,0.18); color: var(--accent2);
    }
    .tooltip-rich .tt-badge.audio { background: rgba(34,197,94,0.15); color: #22c55e; }
    .tooltip-rich .tt-badge.image { background: rgba(245,158,11,0.15); color: #f59e0b; }

    /* Downward tooltip — for sticky thead (above would go off-screen) */
    .tooltip-down {
      bottom: auto;
      top: calc(100% + 6px);
    }
    /* Rightward tooltip — for leftmost model column */
    .tooltip-right {
      bottom: auto; top: 50%;
      left: calc(100% + 8px);
      transform: translateY(-50%);
    }

    /* ── Loading / error ── */
    #state {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }
    footer a:hover { color: var(--text); }
    .contribute-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      border-radius: 0.4rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .contribute-btn:hover { background: var(--accent2); color: #fff; }
  </style>
</head>
<body>

<header>
  <span class="header-icon"><i data-lucide="music-2" width="28" height="28"></i></span>
  <div class="header-text">
    <h1>MuTheoryEval Leaderboard</h1>
    <p>Open benchmarking suite for LLM music theory &amp; music understanding</p>
  </div>
  <div class="header-links">
    <a href="https://github.com/thevertexlab/MuTheoryEval" target="_blank">
      <i data-lucide="github" width="14" height="14"></i> GitHub
    </a>
    <a href="https://github.com/thevertexlab/MuTheoryEval#contributing" target="_blank">
      <i data-lucide="git-pull-request" width="14" height="14"></i> Contribute
    </a>
  </div>
</header>

<div class="controls">
  <div>
    <span style="font-size:0.78rem;color:var(--muted);margin-right:0.4rem;">Mode</span>
    <div class="pill-group" id="mode-group">
      <div class="pill active" data-mode="lite">Lite (reproducible)</div>
      <div class="pill" data-mode="full">Full</div>
    </div>
  </div>

  <div class="modality-filter" id="modality-filter">
    <span style="font-size:0.78rem;color:var(--muted);">Show</span>
    <div class="mod-tag active" data-mod="text">
      <i data-lucide="file-text" width="12" height="12"></i> Text
    </div>
    <div class="mod-tag active" data-mod="image">
      <i data-lucide="image" width="12" height="12"></i> Image
    </div>
    <div class="mod-tag active" data-mod="audio">
      <i data-lucide="music" width="12" height="12"></i> Audio
    </div>
  </div>

  <div class="updated-badge" id="updated-badge">
    <i data-lucide="clock" width="13" height="13"></i>
    <span id="updated-text">loading…</span>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="state">
  <i data-lucide="loader-2" width="18" height="18" style="animation:spin 1s linear infinite"></i>
  Loading data…
</div>
<div class="table-outer">
  <div class="table-wrap" id="table-wrap" style="display:none"></div>
</div>

<footer>
  <span>Data sourced from <code>docs/data.json</code> — updated automatically by contributors via PR.</span>
  <a href="https://github.com/thevertexlab/MuTheoryEval/blob/main/CLAUDE.md" target="_blank">How to run</a>
  <a class="contribute-btn" href="https://github.com/thevertexlab/MuTheoryEval#contributing" target="_blank">
    <i data-lucide="plus-circle" width="14" height="14"></i> Submit your results
  </a>
</footer>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
  // ── Constants ─────────────────────────────────────────────────────────────
  // Models whose thinking/reasoning cannot be disabled — shown with a badge
  const REASONING_NATIVE = ['o1', 'o3', 'o4', 'deepseek-reasoner', 'deepseek-r1'];
  function isReasoningNative(modelKey) {
    return REASONING_NATIVE.some(p => modelKey === p || modelKey.startsWith(p + '-'));
  }
  function hasThinkingVariant(modelKey) {
    // e.g. claude-sonnet-4-6-xt8k, gemini-3.1-flash-high, gemini-2.5-pro-thinking
    return modelKey.includes('-xt') || modelKey.includes('-thinking') || modelKey.includes('-effort')
        || modelKey.endsWith('-high') || modelKey.endsWith('-medium') || modelKey.endsWith('-low') || modelKey.endsWith('-minimal');
  }

  // ── Benchmark descriptions for header tooltips ───────────────────────────
  const BENCH_INFO = {
    music_theory_bench: {
      desc: 'Music knowledge & multi-step reasoning questions derived from the ChatMusician dataset. Heavy on ABC notation analysis — models must parse symbolic scores to answer.',
      subsets: 'Knowledge (269q) · Reasoning (98q)',
      bias: 'Notation-heavy; symbolic reasoning required',
      full: 372, lite: null,  // lite_n=null means run all
    },
    ziqi_eval: {
      desc: 'Broad music knowledge benchmark covering theory, history, instruments, genres, and performance practice. Factual recall-oriented with minimal symbolic notation.',
      subsets: '10 categories · 56 subcategories',
      bias: 'General music knowledge; factual recall',
      full: 14244, lite: 500,
    },
    wildscore: {
      desc: 'Real-world sheet music reasoning questions scraped from online music communities (StackExchange, forums). Paired with score images — requires vision input.',
      subsets: 'Harmony · Rhythm · Form · Notation · Expression',
      bias: 'Practical score reading; real-world phrasing',
      full: 807, lite: 100,
    },
    muchomusic: {
      desc: 'Music perception and theory questions paired with audio clips. Tests whether models can integrate auditory information with conceptual knowledge.',
      subsets: 'Music perception · Theory · Genre · Mood',
      bias: 'Audio-grounded; requires listening comprehension',
      full: 1187, lite: 200,
    },
    cmi_bench: {
      desc: 'Audio-grounded music understanding benchmark spanning 16 MIR tasks (full dataset). Our lite eval covers 4 classification tasks: GTZAN genre (10 classes), GS-key detection (24 keys), NSynth instrument (10 classes), VocalSet technique (10 classes).',
      subsets: '4 / 16 tasks · GTZAN · Key · NSynth · VocalSet · 25q each',
      bias: 'Classification-only subset; full dataset also includes captioning & regression',
      format: 'Multi-select lettered MCQ (A–X); scored by Jaccard similarity. Variable option count per task (10–24).',
      full: null, lite: 100,
    },
  };

  // ── Model API IDs (display only) ──────────────────────────────────────────
  const MODEL_API_IDS = {
    'gpt-5.4': 'gpt-5.4',
    'gpt-5.4-mini': 'gpt-5.4-mini',
    'o3': 'o3',
    'claude-opus-4-6': 'claude-opus-4-6',
    'claude-sonnet-4-6': 'claude-sonnet-4-6',
    'claude-sonnet-4-6-xt8k': 'claude-sonnet-4-6',
    'claude-haiku-4-5': 'claude-haiku-4-5-20251001',
    'gemini-3.1-pro': 'gemini-3.1-pro-preview',
    'gemini-3.1-flash': 'gemini-3-flash-preview',
    'gemini-3.1-flash-minimal': 'gemini-3-flash-preview',
    'gemini-3.1-flash-lite': 'gemini-3.1-flash-lite-preview',
    'deepseek-chat': 'deepseek-chat (= V3.2)',
    'deepseek-reasoner': 'deepseek-reasoner (= R1)',
    'qwen3-max-thinking': 'Qwen/Qwen3-Max-Thinking',
    'llama-4-maverick': 'meta-llama/Llama-4-Maverick-17B-128E-Instruct',
    'deepseek-r1': 'deepseek-ai/DeepSeek-R1',
  };

  // ── State ─────────────────────────────────────────────────────────────────
  let DATA = null;
  let currentMode = 'lite';
  let activeModalities = new Set(['text', 'image', 'audio']);
  let sortKey = '__text';  // '__text'|'__image'|'__audio'|bench key
  let sortDir = 1;         // 1=desc, -1=asc

  // ── Fetch ─────────────────────────────────────────────────────────────────
  fetch('./data.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      DATA = data;
      initUI();
    })
    .catch(err => {
      document.getElementById('state').innerHTML =
        `<i data-lucide="alert-circle" width="18" height="18" style="color:var(--red)"></i>
         Failed to load data.json: ${err.message}`;
      lucide.createIcons();
    });

  // ── Init ──────────────────────────────────────────────────────────────────
  function initUI() {
    // Updated badge
    if (DATA.updated) {
      const d = new Date(DATA.updated);
      document.getElementById('updated-text').textContent =
        'Updated ' + d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    }

    // Mode toggle
    document.getElementById('mode-group').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#mode-group .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentMode = pill.dataset.mode;
      render();
    });

    // Modality filter
    document.getElementById('modality-filter').addEventListener('click', e => {
      const tag = e.target.closest('.mod-tag');
      if (!tag) return;
      const mod = tag.dataset.mod;
      if (activeModalities.has(mod)) {
        if (activeModalities.size === 1) return; // keep at least one
        activeModalities.delete(mod);
        tag.classList.remove('active');
      } else {
        activeModalities.add(mod);
        tag.classList.add('active');
      }
      render();
    });

    render();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function cellsForMode(mode) {
    return DATA.cells.filter(c => c.mode === mode);
  }

  function cellMap(cells) {
    const m = {};
    for (const c of cells) m[c.model + '||' + c.benchmark] = c;
    return m;
  }

  function visibleBenches(benches) {
    return benches.filter(b => activeModalities.has(b.modality));
  }

  // Compute score for a single modality group.
  // For 'text': requires ALL text benches to be present (coverage threshold).
  // For 'image'/'audio': shows partial score if any result available.
  // Returns { score: float|null, have: int, total: int, missing: string[] }
  function computeModalityScore(modelKey, modality, cmap, allBenches) {
    const group = allBenches.filter(b => b.modality === modality);
    if (!group.length) return { score: null, have: 0, total: 0, missing: [] };
    const present = group.filter(b => cmap[modelKey + '||' + b.key]);
    const missing = group.filter(b => !cmap[modelKey + '||' + b.key]).map(b => b.short);
    // Text + Audio: strict — require all benchmarks to prevent partial-coverage inflation
    // (a model missing CMI-Bench would otherwise show inflated audio score from MuChoMusic alone)
    // Image: also strict for consistency (currently only 1 bench so has no effect)
    if (present.length < group.length) {
      return { score: null, have: present.length, total: group.length, missing };
    }
    if (!present.length) return { score: null, have: 0, total: group.length, missing };
    const totalW = present.reduce((s, b) => s + b.weight, 0);
    const score  = present.reduce((s, b) => s + cmap[modelKey + '||' + b.key].accuracy * b.weight, 0) / totalW;
    return { score, have: present.length, total: group.length, missing };
  }

  function heatColor(score) {
    if (score === null) return '';
    // 0–50%: dark red-ish  50–70%: amber-ish  70–100%: green
    const pct = Math.min(1, Math.max(0, score));
    if (pct < 0.5) {
      const t = pct / 0.5;
      return `rgba(239,68,68,${0.08 + t * 0.12})`;
    } else if (pct < 0.7) {
      const t = (pct - 0.5) / 0.2;
      return `rgba(245,158,11,${0.1 + t * 0.1})`;
    } else {
      const t = (pct - 0.7) / 0.3;
      return `rgba(34,197,94,${0.1 + t * 0.2})`;
    }
  }

  function modelCapabilities(mk) {
    const m = DATA.models.find(m => m.key === mk);
    return (m && m.capabilities) ? m.capabilities : ['text'];
  }

  function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const cells = cellsForMode(currentMode);
    const cmap  = cellMap(cells);
    const benches = visibleBenches(DATA.benchmarks);

    // Gather models that have at least one cell in this mode
    const modelKeys = Array.from(new Set(
      DATA.cells.filter(c => c.mode === currentMode).map(c => c.model)
    ));

    // Sort
    // Rank tiers: has score (0–1) > supported but not run (-0.5) > unsupported (-1)
    function sortVal(mk, key) {
      if (key === '__text' || key === '__image' || key === '__audio') {
        const mod = key.replace('__', '');
        const r = computeModalityScore(mk, mod, cmap, DATA.benchmarks);
        if (r.score !== null) return r.score;
        return modelCapabilities(mk).includes(mod) ? -0.5 : -1;
      } else {
        const c = cmap[mk + '||' + key];
        if (c) return c.accuracy;
        const bench = DATA.benchmarks.find(b => b.key === key);
        const mod = bench ? bench.modality : 'text';
        return modelCapabilities(mk).includes(mod) ? -0.5 : -1;
      }
    }
    const modelsSorted = modelKeys.slice().sort((a, b) =>
      (sortVal(b, sortKey) - sortVal(a, sortKey)) * sortDir
    );

    // Stats
    const statsEl = document.getElementById('stats-bar');
    const nCells = cells.filter(c => benches.some(b => b.key === c.benchmark)).length;
    statsEl.innerHTML =
      `<span><strong>${modelsSorted.length}</strong> models</span>` +
      `<span><strong>${benches.length}</strong> benchmarks visible</span>` +
      `<span><strong>${nCells}</strong> result cells</span>`;

    // Build table
    const wrap = document.getElementById('table-wrap');

    // Header
    const thModel = `<th>
      <div class="th-inner">Model</div></th>`;

    function makeScoreTh(key, label, icon, title) {
      const isSorted = sortKey === key;
      return `<th class="sortable mod-score-th${isSorted ? ' sorted' : ''}" onclick="setSort('${key}')" title="${title}">
        <div class="th-inner">
          <i data-lucide="${icon}" width="12" height="12"></i>
          ${label}
          <i data-lucide="chevrons-up-down" width="12" height="12" class="sort-icon"></i>
        </div></th>`;
    }
    const thText  = makeScoreTh('__text',  'Text',  'file-text', 'Text score — requires all text benchmarks (MusicTheoryBench + ZIQI-Eval)');
    const thImage = makeScoreTh('__image', 'Image', 'image',     'Image score — WildScore (sheet music recognition)');
    const thAudio = makeScoreTh('__audio', 'Audio', 'music',     'Audio score — MuChoMusic / CMI-Bench');

    function makeBenchTh(b) {
      const isSorted = sortKey === b.key;
      const srcLink = b.source ? `<a href="https://arxiv.org/abs/${b.source.replace('arXiv:','')}" target="_blank" style="color:var(--muted)" onclick="event.stopPropagation()">
        <i data-lucide="external-link" width="11" height="11"></i></a>` : '';
      const info = BENCH_INFO[b.key] || {};
      const modBadgeClass = b.modality === 'audio' ? 'audio' : b.modality === 'image' ? 'image' : '';
      const liteStr = info.lite_n !== undefined
        ? (info.lite ? `${info.lite}q sampled / ${info.full ?? '?'}q total` : `all ${info.full ?? '?'}q (small dataset)`)
        : (b.lite_n ? `${b.lite_n}q sampled / ${b.n_full ?? '?'}q total` : `${b.n_full ?? '?'}q`);
      const tooltipHTML = `
        <div class="tooltip tooltip-rich tooltip-down">
          <div class="tt-title">${b.name}</div>
          <div class="tt-desc">${info.desc || b.source || ''}</div>
          <hr>
          <table>
            ${info.subsets ? `<tr><td>Subsets</td><td>${info.subsets}</td></tr>` : ''}
            ${info.bias   ? `<tr><td>Bias</td><td>${info.bias}</td></tr>` : ''}
            <tr><td>Format</td><td>${info.format || '4-option MCQ'}</td></tr>
            <tr><td>Lite / Full</td><td>${liteStr}</td></tr>
            <tr><td>Weight</td><td>${b.weight} in <span class="tt-badge ${modBadgeClass}">${b.modality.toUpperCase()}</span> score</td></tr>
            ${b.source ? `<tr><td>Source</td><td>${b.source}</td></tr>` : ''}
          </table>
        </div>`;
      return `<th class="sortable${isSorted?' sorted':''}" onclick="setSort('${b.key}')">
        <div class="th-inner">
          <div class="tooltip-wrap bench-header">
            <div>
              <span class="bench-name">${b.short}</span>
              <span class="bench-meta">
                ${srcLink}
                <i data-lucide="chevrons-up-down" width="11" height="11" class="sort-icon"></i>
              </span>
            </div>
            ${tooltipHTML}
          </div>
        </div></th>`;
    }

    // Build grouped columns: [Text score, ...text benches, Image score, ...image benches, Audio score, ...audio benches]
    const MODALITIES = ['text', 'image', 'audio'];
    const scoreThMap  = { text: thText,  image: thImage,  audio: thAudio  };
    const scoreTdFn   = { text: () => makeScoreTd('text'), image: () => makeScoreTd('image'), audio: () => makeScoreTd('audio') };

    let groupedHeaders = '';
    let groupedCellFns = []; // array of functions: (mk, cmap) => td string

    for (const mod of MODALITIES) {
      const modBenches = benches.filter(b => b.modality === mod);
      if (!modBenches.length) continue;
      groupedHeaders += scoreThMap[mod];
      groupedHeaders += modBenches.map(makeBenchTh).join('');
      const _mod = mod;
      groupedCellFns.push(() => makeScoreTd(_mod));
      for (const b of modBenches) {
        const _b = b;
        groupedCellFns.push((mk) => {
          const c = cmap[mk + '||' + _b.key];
          if (!c) {
            const mkCaps = modelCapabilities(mk);
            if (!mkCaps.includes(_b.modality)) {
              return `<td class="score-miss cell-unsupported">
                <div class="tooltip-wrap" style="justify-content:center">
                  <span style="color:var(--muted);opacity:0.35;font-size:0.8rem">—</span>
                  <div class="tooltip">${_b.modality.charAt(0).toUpperCase()+_b.modality.slice(1)} not supported by this model's API</div>
                </div></td>`;
            }
            return `<td class="score-miss cell-contribute">
              <div class="tooltip-wrap" style="justify-content:center">
                <span class="contribute-hint">
                  <i data-lucide="plus-circle" width="11" height="11"></i>
                </span>
                <div class="tooltip">Not benchmarked yet — contribute results!</div>
              </div></td>`;
          }
          const bg = heatColor(c.accuracy);
          const cfg = c.config || {};
          const thinkingLabel = (() => {
            const t = cfg.thinking;
            if (!t || t === false) return null;
            if (t === 'native') return 'native (always-on)';
            if (typeof t === 'object') {
              if (t.budget_tokens) return `enabled, budget=${t.budget_tokens}`;
              if (t.level)         return `level=${t.level}`;
            }
            return String(t);
          })();
          const u = c.usage || {};
          const tooltipRows = [
            ['Accuracy', fmtPct(c.accuracy)],
            ['Questions', c.n],
            c.seed != null ? ['Seed', c.seed] : null,
            thinkingLabel ? ['Thinking', thinkingLabel] : null,
            cfg.temperature != null ? ['Temperature', cfg.temperature] : null,
            u.avg_thinking_tokens_per_q != null ? ['Avg think tok/q', u.avg_thinking_tokens_per_q] : null,
            u.total_thinking_tokens != null ? ['Total think tok', u.total_thinking_tokens.toLocaleString()] : null,
            u.total_prompt_tokens   != null ? ['Prompt tokens', u.total_prompt_tokens.toLocaleString()] : null,
            c.cost_est_usd != null ? ['Est. cost', '$' + c.cost_est_usd.toFixed(4)] : null,
            c.elapsed_sec  != null ? ['Elapsed', c.elapsed_sec + 's'] : null,
            c.timestamp ? ['Date', fmtDate(c.timestamp)] : null,
            cfg.answer_format && cfg.answer_format !== 'MCQ' ? ['Format', cfg.answer_format] : null,
            cfg.system_prompt_hash ? ['Prompt hash', cfg.system_prompt_hash] : null,
          ].filter(Boolean);
          // Per-task breakdown rows (CMI-Bench and other multi-task benches)
          const ta = c.task_accuracy || {};
          const taKeys = Object.keys(ta);
          const taskBreakdownHTML = taKeys.length >= 2
            ? '<tr><td colspan="2" style="padding-top:0.4rem;padding-bottom:0.1rem;color:var(--muted);font-size:0.68rem;letter-spacing:0.03em">by task</td></tr>'
              + taKeys.map(k =>
                  `<tr><td style="padding-left:0.5rem">${k}</td><td>${fmtPct(ta[k].accuracy)} <span style="color:var(--muted)">(${ta[k].n}q)</span></td></tr>`
                ).join('')
            : '';
          const tooltipHTML = tooltipRows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + taskBreakdownHTML;
          return `<td class="score-cell" style="background:${bg}">
            <div class="tooltip-wrap">
              <div class="score-val">${fmtPct(c.accuracy)}</div>
              <div class="score-n">${c.n}q</div>
              <div class="tooltip"><table>${tooltipHTML}</table></div>
            </div></td>`;
        });
      }
    }

    let tbody = '';
    for (const mk of modelsSorted) {
      const modelMeta = DATA.models.find(m => m.key === mk) || {};
      const provider = modelMeta.provider || '';
      const modelDisplayName = modelMeta.display_name || mk;
      const reasoningBadge = '';
      const thinkingBadge = modelMeta.thinking
        ? `<span class="badge-thinking"><i data-lucide="sparkles" width="9" height="9"></i> thinking</span>`
        : '';

      const caps = modelCapabilities(mk);
      const capChips = [
        ['text',  'T', 'Text'],
        ['image', 'I', 'Image'],
        ['audio', 'A', 'Audio'],
      ].map(([mod, label, title]) => {
        const ok = caps.includes(mod);
        return `<span class="cap-chip ${ok ? 'supported' : 'unsupported'}" title="${ok ? mod+' supported' : mod+' not supported by this model\'s API'}">${label}</span>`;
      }).join('');

      // Build model tooltip content from available cells
      const modelCells = cells.filter(c => c.model === mk);
      const anyCell = modelCells[0] || {};
      const cfg = anyCell.config || {};
      const apiId = MODEL_API_IDS[mk] || mk;
      const modelNote = modelMeta.note || null;
      const thinkingCfg = (() => {
        const t = cfg.thinking;
        if (t && t !== false) {
          if (t === 'native') return 'Always-on (reasoning model)';
          if (typeof t === 'object' && t.budget_tokens) return `Extended thinking, budget=${t.budget_tokens} tok`;
          if (typeof t === 'object' && t.level) return `Level: ${t.level}`;
          return String(t);
        }
        // cfg.thinking may be null/missing when the result cell predates this field —
        // fall back to a generic note for models we know are thinking-enabled.
        if (modelMeta.thinking) return 'Thinking-enabled (see note below for details)';
        return null;
      })();
      const capRows = [['text','T'],['image','I'],['audio','A']].map(([m,l]) =>
        `<span class="tt-badge ${caps.includes(m)?'':'unsupported'}" style="${caps.includes(m)?'':'opacity:0.4'}">${l}</span>`
      ).join(' ');
      const modelTooltipHTML = `
        <div class="tooltip tooltip-rich tooltip-right">
          <div class="tt-title">${modelDisplayName}</div>
          <hr>
          <table>
            <tr><td>Provider</td><td>${provider}</td></tr>
            <tr><td>API model</td><td style="font-family:monospace;font-size:0.68rem">${apiId}</td></tr>
            <tr><td>Modalities</td><td>${capRows}</td></tr>
            ${thinkingCfg ? `<tr><td>Thinking</td><td>${thinkingCfg}</td></tr>` : ''}
            ${cfg.temperature != null ? `<tr><td>Temperature</td><td>${cfg.temperature}</td></tr>` : ''}
            ${cfg.max_output_tokens ? `<tr><td>Max output</td><td>${cfg.max_output_tokens} tok</td></tr>` : ''}
            ${cfg.system_prompt_hash ? `<tr><td>Prompt hash</td><td>${cfg.system_prompt_hash}</td></tr>` : ''}
          </table>
          ${modelNote ? `<div style="margin-top:0.4rem;font-size:0.7rem;opacity:0.75;line-height:1.4">${modelNote}</div>` : ''}
        </div>`;

      const tdModel = `<td>
        <div class="tooltip-wrap model-cell" style="align-items:flex-start">
          <span class="model-name">${modelDisplayName}</span>
          <div class="model-meta">
            <span class="model-provider">${provider}</span>
            ${reasoningBadge}${thinkingBadge}
          </div>
          <div class="cap-chips">${capChips}</div>
          ${modelTooltipHTML}
        </div></td>`;

      function makeScoreTd(mod) {
        const supported = caps.includes(mod);
        if (!supported) {
          return `<td class="score-miss mod-score-miss cell-unsupported">
            <div class="tooltip-wrap" style="justify-content:center">
              <span style="color:var(--muted);opacity:0.4;font-size:0.8rem">—</span>
              <div class="tooltip">${mod.charAt(0).toUpperCase()+mod.slice(1)} not supported by this model's API</div>
            </div>
          </td>`;
        }
        const r = computeModalityScore(mk, mod, cmap, DATA.benchmarks);
        if (r.score !== null) {
          const bg = heatColor(r.score);
          const coverageNote = r.have < r.total ? `<div class="score-n">${r.have}/${r.total}</div>` : '';
          return `<td class="score-cell mod-score-td" style="background:${bg}">
            <div class="score-val">${fmtPct(r.score)}</div>
            ${coverageNote}
          </td>`;
        } else {
          const tip = r.total === 0 ? '' : `Needs: ${r.missing.join(', ')}`;
          const coverageNote = r.have > 0 ? ` (${r.have}/${r.total})` : '';
          return `<td class="score-miss mod-score-miss cell-contribute">
            <div class="tooltip-wrap" style="justify-content:center">
              <span class="contribute-hint">
                <i data-lucide="plus-circle" width="11" height="11"></i>
                ${coverageNote || 'run'}
              </span>
              <div class="tooltip">${tip || 'Not benchmarked yet — contribute results!'}</div>
            </div>
          </td>`;
        }
      }
      const groupedCells = groupedCellFns.map(fn => fn(mk)).join('');
      tbody += `<tr>${tdModel}${groupedCells}</tr>`;
    }

    if (!modelsSorted.length) {
      tbody = `<tr><td colspan="${2 + benches.length}" style="text-align:center;padding:3rem;color:var(--muted)">
        No results for mode="${currentMode}" yet.</td></tr>`;
    }

    wrap.innerHTML = `<table>
      <thead><tr>${thModel}${groupedHeaders}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;

    document.getElementById('state').style.display = 'none';
    wrap.style.display = 'block';

    lucide.createIcons();
  }

  function setSort(key) {
    if (sortKey === key) {
      sortDir = -sortDir;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    render();
  }
</script>
</body>
</html>
